name: Descomprimir ZIP Automáticamente

# Permiso necesario para poder subir (push) los cambios al repositorio
permissions:
  contents: write

# Se activa cuando se sube un archivo .zip a la rama main
on:
  push:
    branches: [ "main" ]
    paths:
      - '**.zip'
  # También puedes ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Obtener el código
        uses: actions/checkout@v4

      # 2. Encuentra el primer .zip en la raíz y lo descomprime
      - name: Buscar y descomprimir el ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No se encontró ningún archivo .zip."
            exit 1
          fi
          echo "Descomprimiendo: $ZIP_FILE"
          unzip -o "$ZIP_FILE"
          rm "$ZIP_FILE"

      # 3. Sube los cambios (el código ya descomprimido) al repositorio
      - name: Subir el código descomprimido
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Acción automática: descomprimir archivo ZIP" || echo "No hay cambios que subir"
          git push
